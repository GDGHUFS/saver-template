services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: saver-template:local
    ports:
      - "${APP_PORT:-5055}:5055"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5055/', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    # PostgreSQL 또는 Valkey 예제를 사용하려면 필요한 환경 변수와 의존성을
    # 주석 해제하세요. src/app.py의 연결 코드도 개발자가 직접 주석 해제해야 합니다.
    # environment:
    #   PG_HOST: postgres
    #   PG_PORT: "5432"
    #   PG_USER: "${PG_USER:-saver}"
    #   PG_PASSWORD: "${PG_PASSWORD:-saver}"
    #   PG_DATABASE: "${PG_DATABASE:-saverdb}"
    #   REDIS_HOST: valkey
    #   REDIS_PORT: "6379"
    #   REDIS_DB: "${REDIS_DB:-0}"
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   valkey:
    #     condition: service_healthy

